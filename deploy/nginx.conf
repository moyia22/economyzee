# ============================================================
# EconomyZee — Nginx Reverse Proxy Configuration
# Domínio: economyzee.com
# Frontend: arquivos estáticos servidos pelo Nginx
# Backend:  NestJS na porta 3333, acessível via /api
# ============================================================

# Redireciona HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name economyzee.com www.economyzee.com;
    return 301 https://economyzee.com$request_uri;
}

# Redireciona www → non-www (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.economyzee.com;

    ssl_certificate     /etc/letsencrypt/live/economyzee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/economyzee.com/privkey.pem;

    return 301 https://economyzee.com$request_uri;
}

# Servidor principal
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name economyzee.com;

    # ─── SSL (Certbot / Let's Encrypt) ───
    ssl_certificate     /etc/letsencrypt/live/economyzee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/economyzee.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ─── Security Headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Gzip Compression ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ─── Frontend (SPA estático) ───
    root /var/www/economyzee/frontend/dist-spa;
    index index.html;

    # ─── Backend API (NestJS porta 3333) ───
    location /api/ {
        proxy_pass http://127.0.0.1:3333/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE (Server-Sent Events) — desabilitar buffering
        proxy_buffering off;
        proxy_cache off;

        # Timeouts generosos para SSE e uploads
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Limite de upload (para fotos de comprovantes via API)
        client_max_body_size 20M;
    }

    # ─── Swagger Docs ───
    location /docs {
        proxy_pass http://127.0.0.1:3333/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── SPA Fallback ───
    # Qualquer rota que não seja /api ou /docs serve o index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Cache de assets estáticos ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
